<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Lugar Favorito</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #000000; font-family: 'Segoe UI', sans-serif;
            touch-action: none; color: #E9D5FF;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #counter-container {
            position: absolute; bottom: 35%; width: 100%; z-index: 2;
            display: flex; justify-content: center; gap: 20px;
            pointer-events: none; text-align: center;
        }
        .unit { display: flex; flex-direction: column; align-items: center; }
        .val { font-size: 5rem; font-weight: bold; text-shadow: 0 0 20px #A855F7; line-height: 1; color: white; }
        .label { font-size: 1rem; letter-spacing: 3px; opacity: 0.9; margin-top: 10px; color: #E9D5FF; }
        @media (max-width: 768px) {
            .val { font-size: 2.5rem; }
            .label { font-size: 0.6rem; }
            #counter-container { gap: 8px; }
        }
    </style>
</head>
<body>
    <canvas id="mainCanvas"></canvas>
    <div id="counter-container">
        <div class="unit"><div id="v-y" class="val">00</div><div class="label">AÑOS</div></div>
        <div class="unit"><div id="v-m" class="val">00</div><div class="label">MESES</div></div>
        <div class="unit"><div id="v-d" class="val">00</div><div class="label">DÍAS</div></div>
        <div class="unit"><div id="v-h" class="val">00</div><div class="label">HRS</div></div>
        <div class="unit"><div id="v-min" class="val">00</div><div class="label">MIN</div></div>
        <div class="unit"><div id="v-s" class="val">00</div><div class="label">SEG</div></div>
    </div>

    <script>
        // Fecha actualizada al 10 de julio de 2026 a las 21:00
        const CONFIG = {
            colors: { darkest: '#000000', purple: '#A855F7' },
            date: { start: new Date(2026, 6, 10, 21, 0, 0) }
        };

        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let width = Math.max(1, window.innerWidth);
        let height = Math.max(1, window.innerHeight);
        const mouse = { x: -1000, y: -1000, active: false };
        
        class Particle {
            constructor() { this.x = 0; this.y = 0; this.baseX = 0; this.baseY = 0; this.vx = 0; this.vy = 0; this.active = false; }
        }
        const particles = Array.from({ length: 15000 }, () => new Particle());
        let particleCount = 0;

        const stars = Array.from({ length: 250 }, () => ({
            x: Math.random() * 3000,
            y: Math.random() * 3000,
            size: Math.random() * 1.2 + 0.3,
            baseOpacity: Math.random() * 0.5 + 0.2,
            twinkleSpeed: Math.random() * 0.01 + 0.005,
            phase: Math.random() * Math.PI * 2
        }));

        function drawStar(ctx, x, y, size, opacity) {
            ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
        }

        function getTimeDiff() {
            const start = CONFIG.date.start;
            const end = new Date();
            let y = end.getFullYear() - start.getFullYear();
            let m = end.getMonth() - start.getMonth();
            let d = end.getDate() - start.getDate();
            let h = end.getHours() - start.getHours();
            let min = end.getMinutes() - start.getMinutes();
            let s = end.getSeconds() - start.getSeconds();

            if (s < 0) { s += 60; min--; }
            if (min < 0) { min += 60; h--; }
            if (h < 0) { h += 24; d--; }
            if (d < 0) {
                const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
                d += prevMonth.getDate();
                m--;
            }
            if (m < 0) { m += 12; y--; }
            
            return { y, m, d, h, min, s };
        }

        function updateCounter() {
            const diff = getTimeDiff();
            document.getElementById('v-y').innerText = Math.max(0, diff.y).toString().padStart(2, '0');
            document.getElementById('v-m').innerText = Math.max(0, diff.m).toString().padStart(2, '0');
            document.getElementById('v-d').innerText = Math.max(0, diff.d).toString().padStart(2, '0');
            document.getElementById('v-h').innerText = Math.max(0, diff.h).toString().padStart(2, '0');
            document.getElementById('v-min').innerText = Math.max(0, diff.min).toString().padStart(2, '0');
            document.getElementById('v-s').innerText = Math.max(0, diff.s).toString().padStart(2, '0');
        }

        function buildTitleMap() {
            if (width < 1 || height < 1) return;
            const offscreen = new OffscreenCanvas(width, height);
            const octx = offscreen.getContext('2d');
            octx.fillStyle = CONFIG.colors.purple;
            octx.textAlign = 'center';
            octx.font = `bold ${width * 0.05}px 'Segoe UI', sans-serif`;
            octx.fillText("EL UNIVERSO ES INFINITO,", width/2, height * 0.20);
            octx.fillText("PERO MI LUGAR FAVORITO ES A TU LADO", width/2, height * 0.30);
            
            const scanH = Math.max(1, Math.floor(height * 0.45));
            const imgData = octx.getImageData(0, 0, width, scanH).data;
            particleCount = 0;
            for (let y = 0; y < scanH; y += 5) {
                for (let x = 0; x < width; x += 5) {
                    if (imgData[(y * width + x) * 4 + 3] > 128) {
                        let p = particles[particleCount++];
                        p.baseX = x; p.baseY = y; p.x = x; p.y = y; p.active = true;
                    }
                }
            }
        }

        function render() {
            ctx.fillStyle = CONFIG.colors.darkest; 
            ctx.fillRect(0, 0, width, height);
            
            const time = Date.now();
            stars.forEach(s => {
                const twinkle = Math.sin(time * s.twinkleSpeed + s.phase) * 0.15;
                const opacity = Math.max(0.1, Math.min(1, s.baseOpacity + twinkle));
                drawStar(ctx, s.x % width, s.y % height, s.size, opacity);
            });

            ctx.fillStyle = CONFIG.colors.purple;
            for (let i = 0; i < particleCount; i++) {
                let p = particles[i];
                let dx = p.x - mouse.x, dy = p.y - mouse.y;
                if (mouse.active && (dx*dx + dy*dy) < 10000) {
                    p.vx += dx * 0.03; p.vy += dy * 0.03;
                }
                p.vx += (p.baseX - p.x) * 0.1; p.vy += (p.baseY - p.y) * 0.1;
                p.vx *= 0.8; p.vy *= 0.8;
                p.x += p.vx; p.y += p.vy;
                ctx.fillRect(p.x, p.y, 3, 3);
            }
            requestAnimationFrame(render);
        }

        function resize() {
            width = canvas.width = Math.max(1, window.innerWidth);
            height = canvas.height = Math.max(1, window.innerHeight);
            buildTitleMap();
        }

        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; });
        window.addEventListener('resize', resize);
        
        resize();
        setInterval(updateCounter, 1000);
        updateCounter();
        requestAnimationFrame(render);
    </script>
</body>
</html>
